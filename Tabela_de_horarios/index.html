<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela De Horários</title>
    <link rel="shortcut icon" href="img/Header_icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

    <script src="main.js"></script>
    <script src="./src/agenda.js"></script>
    <script src="./src/periodo.js"></script>
    <script src="./src/semestre.js"></script>
    <script src="./src/turma.js"></script>
    <script src="./src/util/igualdade_de_arrays.js"></script>
    <script src="./src/dom/gestordeformulario.js"></script>
    <script src="./src/dom/menudecontexto.js"></script>
    <script src="./src/dom/mapeadordetabela.js"></script>
    <script src="./src/dom/formulario.js"></script>
    <script src="./src/dom/tabela.js"></script>

</head>
<body oncontextmenu="return false;">
    <div id="grid-principal">
        <div id="semestre">
            <header> <b> MATERIAS DO SEMESTRE </b> </header>
            <form id="semestre_form">
                <input type="text" id="nome" placeholder="Nome da Turma" required="true" list="disciplinas" />
                <datalist id="disciplinas">
                </datalist>
                <input type="text" id="abreviacao" placeholder="ABVR">
                <input type="text" id="periodo" placeholder="Período" required="true">
                <button type="submit" id='adicionar'>ADICIONAR</button>
            </form>
            <table cellspacing="0" id="semestre_table">
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>ABRV</th>
                        <th>PER</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
                <!-- <tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr><tr><td>123</td><td>123</td><td>123</td></tr> -->
            </table>
        </div>

        <div id="agenda">
            <header> <b> MEU HORARIO </b> </header>
            <table id="agenda_table">
              <thead>
                <tr>
                    <th>NOME</th>
                    <th>ABRV</th>
                    <th>PER</th>
                </tr>
              </thead>
              <tbody>
              </tbody>
            </table>
        </div>

        <div id="horario-completo">
            <table id="horario_completo_table">
            </table>
        </div>
    </div>
</body>
</html>
