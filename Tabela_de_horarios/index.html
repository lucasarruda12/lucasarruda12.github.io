<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela De Horários</title>
    <link rel="shortcut icon" href="img/Header_icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="teste.js"></script>
</head>
<body>
    <div id="grid-principal">
        <div id="semestre">
            <header> MATERIAS DO SEMESTRE </header>
            <form action="">
                <input type="text" id="nome" placeholder="Nome da Turma" required="true">
                <input type="text" id="abreviacao" placeholder="ABVR">
                <input type="text" id="periodo" placeholder="Período" required="true">
                <button type="submit" id='adicionar'>ADICIONAR</button>
            </form>
            <table>
                <tr>
                    <th>NOME</th>
                    <th>ABRV</th>
                    <th>PER</th>
                </tr>
            </table>
        </div>

        <div id="agenda">
            <header> MEU HORARIO </header>
            <table>
                <tr>
                    <th>NOME</th>
                    <th>ABRV</th>
                    <th>PER</th>
                </tr>
            </table>
        </div>

        <div id="horario-completo">
            <table>

            </table>
        </div>
    </div>
</body>
</html>
